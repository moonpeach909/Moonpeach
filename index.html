<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Peach | Artist</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GENERAL */
body{
font-family:Poppins,sans-serif;
margin:0;
background:linear-gradient(135deg,#0f0f1a,#1a1a2e);
color:white;
scroll-behavior:smooth;
overflow-x:hidden;
user-select:none;
}

/* DISABLE IMAGE DRAG */
img{
pointer-events:none;
-webkit-user-drag:none;
user-drag:none;
}

section{padding:70px 6%;}
h2{text-align:center;margin-bottom:30px;}

/* NAVBAR */
.navbar{
display:flex;
justify-content:flex-end;
align-items:center;
padding:20px 6%;
position:fixed;
top:0;
width:100%;
box-sizing:border-box;
z-index:1000;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

.nav-links{display:flex;gap:20px;}

.nav-links a{
color:#ff7ac8;
text-decoration:none;
padding:8px 12px;
border-radius:8px;
transition:.3s;
}

.nav-links a:hover{
background:#ff7ac8;
color:#0f0f1a;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding-top:80px;
}

.avatar{
width:150px;
border-radius:50%;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.hero h1{
font-size:45px;
margin:15px 0;
}

.btn{
margin-top:20px;
padding:12px 25px;
background:#ff7ac8;
border-radius:30px;
text-decoration:none;
color:white;
box-shadow:0 0 15px #ff7ac8;
}

/* ABOUT */
.about{
max-width:800px;
margin:auto;
text-align:center;
line-height:1.7;
}

/* PORTFOLIO */
.tabs{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab-btn{
padding:10px 20px;
border:none;
background:#1a1a2e;
color:#ff7ac8;
border-radius:20px;
cursor:pointer;
}

.tab-btn.active{
background:#ff7ac8;
color:#0f0f1a;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:12px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff7ac8;
}

.nsfw img{
filter:blur(20px);
}

.nsfw img:hover{
filter:none;
}

/* COMMISSIONS */
.prices{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.card{
background:#1a1a2e;
padding:25px;
border-radius:15px;
text-align:center;
width:220px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #ff7ac8;
}

.price{
font-size:22px;
color:#ff7ac8;
margin:10px 0;
font-weight:600;
}

/* PAYMENT ICONS */

.payment-methods{
text-align:center;
margin-top:40px;
}

.payments{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:10px;
}

.payments img{
width:80px;
transition:.3s;
}

.payments img:hover{
transform:scale(1.2);
}

/* CONTACT */

.contact-icons{
display:flex;
justify-content:center;
gap:35px;
flex-wrap:wrap;
margin-top:20px;
}

.contact-icons a{
text-decoration:none;
color:#ff7ac8;
text-align:center;
}

.contact-icons img{
width:60px;
margin-bottom:6px;
transition:.3s;
}

.contact-icons img:hover{
transform:scale(1.2);
}

/* FOOTER */

footer{
padding:30px;
text-align:center;
background: linear-gradient(135deg, #ff7ac8, #ffb6c1);
color:#0f0f1a;
font-weight:bold;
font-size:16px;
}

/* LIGHTBOX */

#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

/* MOBILE */

@media(max-width:768px){

.gallery{
grid-template-columns:1fr 1fr;
}

.hero h1{
font-size:32px;
}

}

</style>
</head>

<body>



</body>
  <script>

/* RIGHT CLICK BLOCK */
document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

/* IMAGE DRAG BLOCK */
document.addEventListener("dragstart",function(e){
e.preventDefault();
});

/* COPY BLOCK */
document.addEventListener("copy",function(e){
e.preventDefault();
});

/* TEXT SELECT BLOCK */
document.addEventListener("selectstart",function(e){
e.preventDefault();
});

/* DEVTOOLS BLOCK */
document.onkeydown=function(e){

if(e.keyCode==123){
return false;
}

if(e.ctrlKey && e.shiftKey && e.keyCode==73){
return false;
}

if(e.ctrlKey && e.shiftKey && e.keyCode==74){
return false;
}

if(e.ctrlKey && e.keyCode==85){
return false;
}

};

/* SCREENSHOT BASIC BLOCK */

document.addEventListener("keyup",function(e){

if(e.key=="PrintScreen"){
navigator.clipboard.writeText("");
alert("Screenshots disabled.");
}

});

</script>
</html>
